<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de páginas y aplicaciones web</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      max-width: 1000px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 25px;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      margin: 25px 0 15px;
      font-weight: 600;
    }

    form {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 35px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    form:hover {
      transform: translateY(-4px);
    }

    /* 🔥 LABELS SOLO PARA TEXTO (no botón) */
    label:not(.file-label) {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #cbd5f5;
      margin-bottom: 6px;
      position: relative;
      padding-bottom: 4px;
    }

    label:not(.file-label)::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 40%;
      height: 2px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      border-radius: 2px;
      transition: 0.3s;
    }

    label:not(.file-label):hover::after {
      width: 100%;
    }

    input[type=text] {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 18px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.3);
    }

    .file-input {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .file-input input[type="file"] {
      display: none;
    }

    .file-label {
      padding: 10px 16px;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.25s;
    }

    .file-label:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34,197,94,0.4);
    }

    /* TEXTO ARCHIVO */
    #file-name {
      font-size: 0.85rem;
      color: #94a3b8;
      transition: 0.2s;
    }

    #file-name.active {
      color: #38bdf8;
      font-weight: 500;
    }

    button {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      color: white;
      transition: all 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 20px rgba(56,189,248,0.4);
    }

    button:active {
      transform: scale(0.97);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    th {
      text-align: left;
      padding: 14px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.08);
      color: #cbd5f5;
    }

    td {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
    }

    tr:hover {
      background: rgba(56,189,248,0.08);
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn-delete {
      background: linear-gradient(135deg, #ef4444, #f87171);
    }

    .btn-delete:hover {
      box-shadow: 0 8px 20px rgba(239,68,68,0.4);
    }
  </style>
</head>

<body>

  <h1>Gestión de páginas y aplicaciones web</h1>

  <form action="/provision" method="POST" enctype="multipart/form-data">

    <label>Nombre del host</label>
    <input type="text" name="hostname" placeholder="Ingrese el nombre del host" required>

    <label>Contenido web (.zip)</label>
    <div class="file-input">
      <input type="file" name="zipfile" id="file" accept=".zip" required>
      <label for="file" class="file-label">Seleccionar archivo</label>
      <span id="file-name">Ningún archivo seleccionado</span>
    </div>

    <button type="submit">Publicar</button>
  </form>

  {{if .Instances}}
  <h2>Instancias disponibles</h2>
  <table>
    <tr>
      <th>URL</th>
      <th>IP</th>
      <th>Hostname</th>
      <th>Creada</th>
      <th>Acciones</th>
    </tr>

    {{range .Instances}}
    <tr>
      <td>
        <a href="http://localhost:{{.HTTPPort}}" target="_blank">
          http://{{.Hostname}}.cloud.local
        </a>
      </td>
      <td>{{.IP}}</td>
      <td>{{.Hostname}}</td>
      <td>{{.CreatedAt.Format "2006-01-02 15:04:05"}}</td>
      <td>
        <form action="/delete" method="POST" style="margin:0">
          <input type="hidden" name="hostname" value="{{.Hostname}}">
          <button class="btn-delete" type="submit">Eliminar</button>
        </form>
      </td>
    </tr>
    {{end}}

  </table>
  {{end}}

  <script>
    const fileInput = document.getElementById("file");
    const fileName = document.getElementById("file-name");

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
        fileName.classList.add("active");
      } else {
        fileName.textContent = "Ningún archivo seleccionado";
        fileName.classList.remove("active");
      }
    });
  </script>

</body>
</html>
