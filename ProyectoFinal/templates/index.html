<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de páginas y aplicaciones web</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    form { background: #f0f4ff; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
    label { display: block; font-size: 0.85rem; margin-bottom: 4px; }
    input[type=text], input[type=file] { width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box; }
    button { padding: 8px 20px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    a { color: #2563eb; }
    .btn-delete { background: #dc2626; color: white; border: none; padding: 6px 14px;
                  border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Gestión de páginas y aplicaciones web</h1>

  <form action="/provision" method="POST" enctype="multipart/form-data">
    <label>Nombre del host</label>
    <input type="text" name="hostname" placeholder="paisajes" required>
    <label>Contenido web (.zip)</label>
    <input type="file" name="zipfile" accept=".zip" required>
    <button type="submit">Publicar</button>
  </form>

  {{if .Instances}}
  <h2>Instancias disponibles</h2>
  <table>
    <tr>
      <th>URL</th><th>IP</th><th>Hostname</th><th>Creada</th><th></th>
    </tr>
    {{range .Instances}}
    <tr>
      <td><a href="http://{{.Hostname}}.cloud.local" target="_blank">
        http://{{.Hostname}}.cloud.local</a></td>
      <td>{{.IP}}</td>
      <td>{{.Hostname}}</td>
      <td>{{.CreatedAt.Format "2006-01-02 15:04:05"}}</td>
      <td>
        <form action="/delete" method="POST" style="margin:0">
          <input type="hidden" name="hostname" value="{{.Hostname}}">
          <button class="btn-delete" type="submit">Eliminar</button>
        </form>
      </td>
    </tr>
    {{end}}
  </table>
  {{end}}
</body>
</html>
